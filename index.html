<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proyecto 1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app">

  <header class="hero">
    <section>
      <p class="eyebrow">IMDB</p>
      <h1>Mis series</h1>
    </section>

    <nav class="actions">
      <button id="themeToggle" class="icon-button" type="button">🌙</button>
      <span id="apiStatus" class="status">Conectando API...</span>
      <button id="refreshButton" class="icon-button" type="button">↻</button>
      <a href="form.html" class="primary link-button">Agregar</a>
    </nav>
  </header>

  <section class="controls">
    <input
      id="searchInput"
      type="search"
      placeholder="Buscar serie por nombre..."
      autocomplete="off"
    >

    <select id="sortSelect">
      <option value="">Ordenar por</option>
      <option value="name">Nombre</option>
      <option value="rating">Rating</option>
      <option value="current_episode">Episodio actual</option>
      <option value="total_episodes">Total episodios</option>
    </select>

    <select id="orderSelect">
      <option value="desc">Descendente</option>
      <option value="asc">Ascendente</option>
    </select>

    <button id="searchButton" class="primary" type="button">Aplicar</button>
    <button id="clearSearch" class="secondary" type="button">Limpiar</button>
  </section>

  <section id="seriesList" class="imdb-grid"></section>

</main>

<template id="seriesTemplate">
  <article class="imdb-card">
    <img class="cover" alt="">
    <section class="imdb-body">
      <p class="imdb-rating"></p>
      <h3 class="imdb-title"></h3>
      <p class="episodes"></p>
      <progress class="progress-bar" value="0" max="100"></progress>
      <footer class="card-actions">
        <button type="button" class="view">Ver</button>
        <button type="button" class="edit">Editar</button>
        <button type="button" class="delete">Eliminar</button>
      </footer>
    </section>
  </article>
</template>

<script src="app.js"></script>
<script src="listado.js"></script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Series Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app">

  <header class="hero">
    <section>
      <p class="eyebrow">Series Tracker</p>
      <h1>Mis series</h1>
    </section>
    <span id="apiStatus" class="status">Conectando API...</span>
  </header>

  <section>
    <header class="toolbar">
      <h2>Listado</h2>
      <nav class="actions">
        <button id="refreshButton" class="icon-button">↻</button>
        <a href="form.html" class="primary link-button">Agregar</a>
      </nav>
    </header>

    <section id="seriesList" class="series-list"></section>
  </section>

</main>

<template id="seriesTemplate">
  <article class="card">
    <img class="cover" alt="">
    <section class="card-body">

      <header class="card-header">
        <h3></h3>
        <span class="rating"></span>
      </header>

      <p class="episodes"></p>
      <progress class="progress-bar" value="0" max="100"></progress>

      <footer class="card-actions">
        <button class="view">Ver</button>
        <button class="edit">Editar</button>
        <button class="delete">Eliminar</button>
      </footer>

    </section>
  </article>
</template>

<script src="app.js"></script>
<script src="listado.js"></script>
</body>
</html>
